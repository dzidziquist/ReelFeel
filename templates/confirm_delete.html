{% extends "base.html" %}
{% block title %}Delete Entry — MovieRater{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto text-center py-12">
  <p class="text-5xl mb-4">🗑️</p>
  <h1 class="text-xl font-bold mb-2">Delete this entry?</h1>
  <p class="text-gray-400 text-sm mb-6">
    {{ entry.media.title }} — {{ entry.watched_on }} ({{ entry.rating }}/5)
  </p>
  <form method="post" class="flex gap-3 justify-center">
    {% csrf_token %}
    <button type="submit"
            class="bg-red-700 hover:bg-red-600 text-white px-5 py-2 rounded-lg font-medium transition-colors">
      Delete
    </button>
    <a href="{% url 'media_detail' entry.media.tmdb_id %}"
       class="px-5 py-2 rounded-lg border border-gray-700 text-gray-400 hover:border-gray-500 transition-colors font-medium">
      Cancel
    </a>
  </form>
</div>
{% endblock %}

{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}ReelFeel{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#14b8a6', dark: '#0f766e' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />
</head>
<body class="bg-gray-950 text-gray-100 min-h-full flex flex-col">

  <!-- Nav -->
  <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-14">
      <a href="{% url 'home' %}" class="text-brand font-bold text-xl tracking-tight">
        🎬 ReelFeel
      </a>
      <div class="flex items-center gap-6 text-sm font-medium">
        <a href="{% url 'home' %}" class="hover:text-brand transition-colors">Diary</a>
        <a href="{% url 'library' %}" class="hover:text-brand transition-colors">Library</a>
        <a href="{% url 'search' %}" class="hover:text-brand transition-colors">Search</a>
        <a href="{% url 'add_entry' %}" class="bg-brand hover:bg-brand-dark text-white px-3 py-1.5 rounded-lg transition-colors">
          + Log
        </a>
      </div>
    </div>
  </nav>

  <!-- Messages -->
  {% if messages %}
  <div class="max-w-6xl mx-auto px-4 pt-4 w-full">
    {% for message in messages %}
    <div class="bg-red-900/50 border border-red-700 text-red-200 px-4 py-2 rounded-lg mb-2 text-sm">
      {{ message }}
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <!-- Content -->
  <main class="flex-1 max-w-6xl mx-auto px-4 py-8 w-full">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-gray-600 text-xs py-6 border-t border-gray-800">
    ReelFeel — personal media tracker
  </footer>

  <script src="{% static 'js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Red accent bars -->
  <rect x="0" y="0" width="1200" height="5" fill="#cc3333"/>
  <rect x="0" y="625" width="1200" height="5" fill="#cc3333" opacity="0.4"/>

  <!-- Film strip shape (left decorative) -->
  <g opacity="0.12">
    <rect x="-10" y="180" width="80" height="270" rx="4" fill="#ffffff"/>
    <rect x="2" y="200" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="2" y="228" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="2" y="256" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="2" y="284" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="2" y="312" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="2" y="340" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="58" y="200" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="58" y="228" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="58" y="256" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="58" y="284" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="58" y="312" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="58" y="340" width="12" height="16" rx="2" fill="#0a0a0a"/>
  </g>

  <!-- Film strip shape (right decorative) -->
  <g opacity="0.12">
    <rect x="1130" y="180" width="80" height="270" rx="4" fill="#ffffff"/>
    <rect x="1142" y="200" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="1142" y="228" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="1142" y="256" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="1142" y="284" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="1142" y="312" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="1142" y="340" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="1198" y="200" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="1198" y="228" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="1198" y="256" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="1198" y="284" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="1198" y="312" width="12" height="16" rx="2" fill="#0a0a0a"/>
    <rect x="1198" y="340" width="12" height="16" rx="2" fill="#0a0a0a"/>
  </g>

  <!-- App name -->
  <text x="600" y="268" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="96" fill="#ffffff" text-anchor="middle" letter-spacing="-3">ReelFeel</text>

  <!-- Red underline -->
  <rect x="472" y="284" width="256" height="4" fill="#cc3333"/>

  <!-- Tagline in gold italic -->
  <text x="600" y="338" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="28" fill="#d4af37" text-anchor="middle">your feelings, your films.</text>

  <!-- Value prop -->
  <text x="600" y="400" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="36" fill="#ffffff" text-anchor="middle" opacity="0.9">Log it. Rate it. Feel it.</text>

  <!-- Mono spec line -->
  <text x="600" y="454" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="16" fill="#555555" text-anchor="middle" letter-spacing="2">No followers · No feeds · Just yours.</text>

  <!-- Divider -->
  <line x1="480" y1="490" x2="720" y2="490" stroke="#222222" stroke-width="1"/>

  <!-- Domain -->
  <text x="600" y="522" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="15" fill="#444444" text-anchor="middle" letter-spacing="1">reelfeel.me</text>
